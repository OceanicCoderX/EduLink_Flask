<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Update Password - EduLink</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/logo.png') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>
<body>
    <div class="login-container">
        <div class="login-bg"></div>
        <div class="login-card">
            <div class="login-header">
                <div class="logo-circle"><img src="{{ url_for('static', filename='images/logo.png') }}" alt="EduLink Logo"></div>
                <h1 class="login-title">Set New Password</h1>
            </div>
            <form action="{{ url_for('auth.update_password') }}" method="POST">
                <input type="hidden" name="email" value="{{ email }}">
                <div class="form-group">
                    <label class="form-label">New Password</label>
                    <div class="input-wrapper">
                        <input type="password" name="new_password" class="form-input" placeholder="Enter new password" required>
                        <i class="fas fa-lock input-icon"></i>
                    </div>
                </div>
                <button type="submit" class="login-btn"><i class="fas fa-save"></i> Update Password</button>
            </form>
        </div>
    </div>
</body>
</html>
