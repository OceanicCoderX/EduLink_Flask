<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - EduLink</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/logo.png') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/signup.css') }}">
</head>
<body>
    <div class="signup-container">
        <div class="signup-bg"></div>
        <div class="signup-card">
            <div class="back-page">
                <a href="{{ url_for('auth.index') }}"><i class="fa-solid fa-arrow-left"></i> Back</a>
            </div>
            
            <div class="signup-header">
                <img src="{{ url_for('static', filename='images/logo.png') }}" alt="EduLink Logo" class="signup-logo">
                <h1 class="signup-title">Create Your Account</h1>
            </div>

            {% if error %}
            <div class="error-message" style="display:block;background:#fee;color:#c00;padding:10px;border-radius:8px;margin-bottom:16px;">
                <i class="fas fa-exclamation-circle"></i> {{ error }}
            </div>
            {% endif %}

            <form id="signupForm" action="{{ url_for('auth.signup') }}" method="POST" enctype="multipart/form-data">

                <!-- Profile Picture Upload -->
                <div class="profile-pic-upload">
                    <label class="upload-box" for="profilePicInput" id="profilePicBox">
                        <input type="file" id="profilePicInput" name="profilePicInput" accept="image/*">
                        <i class="fas fa-camera upload-icon"></i>
                        <img id="profilePicPreview" class="upload-preview" alt="Profile Preview">
                        <span class="remove-image" id="removeProfilePic"><i class="fas fa-times"></i></span>
                    </label>
                    <p class="upload-label">Profile Picture (Optional)</p>
                </div>

                <!-- Cover Picture Upload -->
                <div class="cover-pic-upload" style="margin-bottom:24px;">
                    <label class="upload-box cover" for="coverPicInput" id="coverPicBox">
                        <input type="file" id="coverPicInput" name="coverPicInput" accept="image/*">
                        <i class="fas fa-image upload-icon"></i>
                        <img id="coverPicPreview" class="upload-preview" alt="Cover Preview">
                        <span class="remove-image" id="removeCoverPic"><i class="fas fa-times"></i></span>
                    </label>
                    <p class="upload-label">Background Picture (Optional)</p>
                </div>

                <!-- Name & Username -->
                <div class="form-row">
                    <div class="form-group">
                        <label for="profilename">Full Name <span style="color:var(--accent-2)">*</span></label>
                        <div class="input-icon">
                            <i class="fas fa-user"></i>
                            <input type="text" id="profilename" name="profilename" required placeholder="Enter your profile name">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="username">Username <span style="color:var(--accent-2)">*</span></label>
                        <div class="input-icon">
                            <i class="fas fa-at"></i>
                            <input type="text" id="username" name="username" required placeholder="Choose a username">
                        </div>
                    </div>
                </div>

                <!-- Email & WhatsApp -->
                <div class="form-row">
                    <div class="form-group">
                        <label for="email">Email <span style="color:var(--accent-2)">*</span></label>
                        <div class="input-icon">
                            <i class="fas fa-envelope"></i>
                            <input type="email" id="email" name="email" required placeholder="Enter your email">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="whatsapp">WhatsApp <span style="color:var(--accent-2)">*</span></label>
                        <div class="input-icon">
                            <i class="fab fa-whatsapp"></i>
                            <input type="number" id="whatsapp" name="whatsapp" required placeholder="WhatsApp number" pattern="[0-9]{10}">
                        </div>
                    </div>
                </div>

                <!-- Bio -->
                <div class="form-group" style="position:relative;">
                    <label for="bio">Bio (Optional)</label>
                    <textarea id="bio" name="bio" maxlength="200" placeholder="Tell us about yourself..."></textarea>
                    <span class="char-count" id="bioCharCount">0/200</span>
                </div>

                <!-- Password -->
                <div class="form-group">
                    <label for="password">Password <span style="color:var(--accent-2)">*</span></label>
                    <div class="input-icon">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" name="password" required placeholder="Create a password">
                        <i class="fas fa-eye" id="togglePassword" style="position:absolute;right:16px;left:auto;cursor:pointer;color:var(--text-muted);"></i>
                    </div>
                </div>

                <button type="submit" class="signup-btn">
                    <i class="fas fa-user-plus"></i> Create Account
                </button>
            </form>

            <div class="login-link" style="text-align:center;margin-top:16px;">
                Already have an account? <a href="{{ url_for('auth.login') }}">Login</a>
            </div>
        </div>
    </div>
    <script src="{{ url_for('static', filename='js/signup.js') }}"></script>
</body>
</html>
