<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - EduLink</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/logo.png') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>
<body>
    <div class="login-container">
        <div class="login-bg"></div>
        <div class="login-card">
            <div class="login-header">
                <div class="logo-circle"><img src="{{ url_for('static', filename='images/logo.png') }}" alt="EduLink Logo"></div>
                <h1 class="login-title">Forgot Password</h1>
            </div>

            {% if error %}
            <div class="error-message" style="display:block;"><i class="fas fa-exclamation-circle"></i> {{ error }}</div>
            {% endif %}

            <form action="{{ url_for('auth.forgot_password') }}" method="POST">
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <div class="input-wrapper">
                        <input type="email" name="email" class="form-input" placeholder="Enter your registered email" required>
                        <i class="fas fa-envelope input-icon"></i>
                    </div>
                </div>
                <button type="submit" class="login-btn"><i class="fas fa-paper-plane"></i> Send Reset Link</button>
            </form>

            <div class="signup-link"><a href="{{ url_for('auth.login') }}"><i class="fas fa-arrow-left"></i> Back to Login</a></div>
        </div>
    </div>
</body>
</html>
